<div class="layout-shell">
  <!-- Top Bar (Sticky at top, full width) -->
  <header class="topbar">
    <div class="topbar-left">
      <button (click)="toggleSidebar()" class="toggle-sidebar" aria-label="Toggle sidebar">
        @if (!sidebarOpen) {
        <span>☰</span>
        } @else {
        <span>←</span>
        }
      </button>

      <div>
        <h1>Dashboard</h1>
        <p class="subtitle">GoalTracker</p>
      </div>
    </div>

    <button type="button" class="theme-toggle" (click)="toggleTheme()">
      @if (theme === 'light') {
      <span>🌙 Dark mode</span>
      } @else {
      <span>☀️ Light mode</span>
      }
    </button>
  </header>

  <!-- Sidebar + Main Content Row (takes remaining height) -->
  <div class="layout-body">
    <aside [class.expanded]="sidebarOpen" class="sidebar">
      <nav>
        <a routerLink="/" class="nav-link">Home</a>
        <a routerLink="/about" class="nav-link">About</a>
      </nav>
    </aside>

    <main class="content-area">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
