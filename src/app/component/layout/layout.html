<div class="h-screen flex flex-col">
  <!-- Top Bar (Sticky at top, full width) -->
  <header class="h-14 bg-white shadow flex items-center px-4 gap-3 shrink-0">
    <button (click)="toggleSidebar()" class="p-2 rounded hover:bg-gray-100 focus:outline-none transition-all">
      <!-- Show ☰ when sidebar is closed, ✕ when open -->
      @if (!sidebarOpen) {
      <span class="text-xl">☰</span>
      } @else {
      <span class="text-xl">✕</span>
      }
    </button>
    <h1 class="text-lg font-semibold">Dashboard</h1>
  </header>

  <!-- Sidebar + Main Content Row (takes remaining height) -->
  <div class="flex-1 flex overflow-hidden">
    <!-- Sidebar with conditional width & transition -->
    <aside [class.w-64]="sidebarOpen" [class.w-0]="!sidebarOpen"
      class="bg-gray-800 text-white flex flex-col transition-all duration-300 overflow-hidden shrink-0">

      <nav class="flex-1 p-4 space-y-2 whitespace-nowrap">
        <a routerLink="/" class="block px-3 py-2 rounded hover:bg-gray-700">Home</a>
        <a routerLink="/allGoals" class="block px-3 py-2 rounded hover:bg-gray-700">Goals</a>
        <a routerLink="/dailyGoals" class="block px-3 py-2 rounded hover:bg-gray-700">Daily Goals</a>
      </nav>
    </aside>

    <!-- Main Content Area -->
    <main class="flex-1 overflow-auto p-4 bg-gray-50">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
