<p>goal-form-data works!</p>
<div class="h-screen flex flex-col">
    <div class="flex-1 p-4 overflow-auto">
        <form (ngSubmit)="submitForm()" class="h-full flex flex-col space-y-5">
            <!-- Goal Name (existing) -->
            <div>
                <label class="block text-sm font-medium mb-1">Goal Name</label>
                <input type="text" [(ngModel)]="title" name="title" required
                    class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400"
                    placeholder="Enter goal name" />
            </div>

            <!-- Two-button toggle: Yes or not Goal / Goal with value -->
            <div>
                <label class="block text-sm font-medium mb-2">Goal Type</label>
                <div class="flex gap-3">
                    <button type="button" (click)="goalValueType = 'yesNo'"
                        [class.bg-blue-500]="goalValueType === 'yesNo'" [class.text-white]="goalValueType === 'yesNo'"
                        [class.border-blue-500]="goalValueType === 'yesNo'"
                        class="px-4 py-2 border rounded-lg hover:bg-gray-100 transition">
                        Yes or not Goal
                    </button>
                    <button type="button" (click)="goalValueType = 'withValue'"
                        [class.bg-blue-500]="goalValueType === 'withValue'"
                        [class.text-white]="goalValueType === 'withValue'"
                        [class.border-blue-500]="goalValueType === 'withValue'"
                        class="px-4 py-2 border rounded-lg hover:bg-gray-100 transition">
                        Goal with value
                    </button>
                </div>
            </div>

            <!-- Conditional target value field (only for Goal with value) -->
            <div *ngIf="goalValueType === 'withValue'">
                <label class="block text-sm font-medium mb-1">Target Value</label>
                <input type="number" [(ngModel)]="targetValue" name="targetValue"
                    class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400"
                    placeholder="e.g., 1000 steps, 5kg" />
            </div>

            <!-- From: Date and Time (default current date+time, with time selection) -->
            <div>
                <label class="block text-sm font-medium mb-1">From</label>
                <input type="datetime-local" [(ngModel)]="startDateTime" name="startDateTime" required
                    class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400" />
            </div>

            <!-- Frequency selection: Daily / Weekly / Monthly / Yearly -->
            <div>
                <label class="block text-sm font-medium mb-2">Frequency</label>
                <div class="flex flex-wrap gap-2">
                    <button type="button" (click)="frequency = 'daily'" [class.bg-blue-500]="frequency === 'daily'"
                        [class.text-white]="frequency === 'daily'"
                        class="px-4 py-2 border rounded-lg hover:bg-gray-100 transition">Daily</button>
                    <button type="button" (click)="frequency = 'weekly'" [class.bg-blue-500]="frequency === 'weekly'"
                        [class.text-white]="frequency === 'weekly'"
                        class="px-4 py-2 border rounded-lg hover:bg-gray-100 transition">Weekly</button>
                    <button type="button" (click)="frequency = 'monthly'" [class.bg-blue-500]="frequency === 'monthly'"
                        [class.text-white]="frequency === 'monthly'"
                        class="px-4 py-2 border rounded-lg hover:bg-gray-100 transition">Monthly</button>
                    <button type="button" (click)="frequency = 'yearly'" [class.bg-blue-500]="frequency === 'yearly'"
                        [class.text-white]="frequency === 'yearly'"
                        class="px-4 py-2 border rounded-lg hover:bg-gray-100 transition">Yearly</button>
                </div>
            </div>

            <!-- Dynamic sub-options based on frequency -->
            <!-- Daily: Every __ Days -->
            <div *ngIf="frequency === 'daily'">
                <div class="flex items-center gap-3">
                    <span class="text-sm font-medium">Every</span>
                    <input type="number" min="1" [(ngModel)]="everyNDays" name="everyNDays"
                        class="w-24 border rounded-lg px-3 py-2 text-center" />
                    <span class="text-sm">day(s)</span>
                </div>
            </div>

            <!-- Weekly: Every __ Weeks + Weekday checkboxes -->
            <div *ngIf="frequency === 'weekly'">
                <div class="flex items-center gap-3 mb-3">
                    <span class="text-sm font-medium">Every</span>
                    <input type="number" min="1" [(ngModel)]="everyNWeeks" name="everyNWeeks"
                        class="w-24 border rounded-lg px-3 py-2 text-center" />
                    <span class="text-sm">week(s) on</span>
                </div>
                <div class="flex flex-wrap gap-3">
                    <label *ngFor="let day of weekDaysList; let i = index" class="flex items-center gap-1">
                        <input type="checkbox" [(ngModel)]="weekdaysSelected[i]" [name]="'weekday_' + i"
                            class="rounded" />
                        <span class="text-sm">{{ day }}</span>
                    </label>
                </div>
                <p *ngIf="!anyWeekdaySelected" class="text-xs text-red-500 mt-1">Select at least one weekday</p>
            </div>

            <!-- Monthly: Every __ Months + Day of month -->
            <div *ngIf="frequency === 'monthly'">
                <div class="flex items-center gap-3 mb-2">
                    <span class="text-sm font-medium">Every</span>
                    <input type="number" min="1" [(ngModel)]="everyNMonths" name="everyNMonths"
                        class="w-24 border rounded-lg px-3 py-2 text-center" />
                    <span class="text-sm">month(s)</span>
                </div>
                <div class="flex items-center gap-3">
                    <span class="text-sm font-medium">On day</span>
                    <input type="number" min="1" max="31" [(ngModel)]="dayOfMonth" name="dayOfMonth"
                        class="w-24 border rounded-lg px-3 py-2 text-center" />
                </div>
            </div>

            <!-- Yearly: Every __ Years + Month + Day -->
            <div *ngIf="frequency === 'yearly'">
                <div class="flex items-center gap-3 mb-2">
                    <span class="text-sm font-medium">Every</span>
                    <input type="number" min="1" [(ngModel)]="everyNYears" name="everyNYears"
                        class="w-24 border rounded-lg px-3 py-2 text-center" />
                    <span class="text-sm">year(s)</span>
                </div>
                <div class="flex gap-3 items-center flex-wrap">
                    <div class="flex items-center gap-2">
                        <span class="text-sm">Month:</span>
                        <select [(ngModel)]="yearlyMonth" name="yearlyMonth" class="border rounded-lg px-2 py-1">
                            <option *ngFor="let month of months" [value]="month.value">{{ month.name }}</option>
                        </select>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="text-sm">Day:</span>
                        <input type="number" min="1" max="31" [(ngModel)]="yearlyDay" name="yearlyDay"
                            class="w-20 border rounded-lg px-2 py-1" />
                    </div>
                </div>
            </div>

            <!-- Reminders section -->
            <div>
                <div class="flex items-center gap-2 mb-2">
                    <input type="checkbox" [(ngModel)]="remindersEnabled" name="remindersEnabled" class="w-4 h-4" />
                    <label class="text-sm font-medium">Enable Reminders</label>
                </div>
                <div *ngIf="remindersEnabled" class="ml-6">
                    <label class="block text-sm font-medium mb-1">Remind me</label>
                    <select [(ngModel)]="reminderOffset" name="reminderOffset" class="border rounded-lg px-3 py-2 w-48">
                        <option value="5min">5 minutes before</option>
                        <option value="15min">15 minutes before</option>
                        <option value="30min">30 minutes before</option>
                        <option value="1hour">1 hour before</option>
                        <option value="1day">1 day before</option>
                        <option value="1week">1 week before</option>
                    </select>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="flex justify-end gap-2 mt-4 pt-2 border-t">
                <button type="button" (click)="close.emit()" class="px-4 py-2 border rounded-lg hover:bg-gray-100">
                    Cancel
                </button>
                <button type="submit" class="px-4 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600">
                    Save
                </button>
            </div>
        </form>
    </div>
</div>
