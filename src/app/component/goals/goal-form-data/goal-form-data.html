
<div class="overlay">
    <div class="form-container">
        <form (ngSubmit)="submitForm()" class="form">
            <!-- Goal Name (existing) -->
            <div class="form-group">
                <label class="label">Goal Name</label>
                <input type="text" [(ngModel)]="title" name="title" required class="input" autofocus
                    placeholder="Enter goal name" />
            </div>

            <!-- Two-button toggle: Yes or not Goal / Goal with value -->
            <div class="form-group">
                <label class="label">Goal Type</label>
                <div class="button-group">
                    <button type="button" (click)="goalValueType = 'yesNo'"
                        [class.button-active]="goalValueType === 'yesNo'"
                        class="button">
                        Yes or not Goal
                    </button>
                    <button type="button" (click)="goalValueType = 'withValue'"
                        [class.button-active]="goalValueType === 'withValue'"
                        class="button">
                        Goal with value
                    </button>
                </div>
            </div>

            <!-- Conditional target value field (only for Goal with value) -->
            <div *ngIf="goalValueType === 'withValue'" class="form-group">
                <label class="label">Target Value</label>
                <input type="number" [(ngModel)]="targetValue" name="targetValue" class="input"
                    placeholder="e.g., 1000 steps, 5kg" />
            </div>

            <!-- From: Date and Time (default current date+time, with time selection) -->
            <div class="form-group">
                <label class="label">From</label>
                <input type="datetime-local" [(ngModel)]="startDateTime" name="startDateTime" required class="input" />
            </div>

            <!-- Frequency selection: Daily / Weekly / Monthly / Yearly -->
            <div class="form-group">
                <label class="label">Frequency</label>
                <div class="frequency-buttons">
                    <button type="button" (click)="frequency = 'daily'" [class.button-active]="frequency === 'daily'"
                        class="button">Daily</button>
                    <button type="button" (click)="frequency = 'weekly'" [class.button-active]="frequency === 'weekly'"
                        class="button">Weekly</button>
                    <button type="button" (click)="frequency = 'monthly'" [class.button-active]="frequency === 'monthly'"
                        class="button">Monthly</button>
                    <button type="button" (click)="frequency = 'yearly'" [class.button-active]="frequency === 'yearly'"
                        class="button">Yearly</button>
                </div>
            </div>

            <!-- Dynamic sub-options based on frequency -->
            <!-- Daily: Every __ Days -->
            <div *ngIf="frequency === 'daily'" class="form-group">
                <div class="flex items-center gap-3">
                    <span class="text-sm font-medium">Every</span>
                    <input type="number" min="1" [(ngModel)]="everyNDays" name="everyNDays" class="number-input input" />
                    <span class="text-sm">day(s)</span>
                </div>
            </div>

            <!-- Weekly: Every __ Weeks + Weekday checkboxes -->
            <div *ngIf="frequency === 'weekly'" class="form-group">
                <div class="flex items-center gap-3 mb-3">
                    <span class="text-sm font-medium">Every</span>
                    <input type="number" min="1" [(ngModel)]="everyNWeeks" name="everyNWeeks" class="number-input input" />
                    <span class="text-sm">week(s) on</span>
                </div>
                <div class="checkbox-group">
                    <label *ngFor="let day of weekDaysList; let i = index" class="checkbox-label">
                        <input type="checkbox" [(ngModel)]="weekdaysSelected[i]" [name]="'weekday_' + i" class="checkbox" />
                        <span>{{ day }}</span>
                    </label>
                </div>
                <p *ngIf="!anyWeekdaySelected" class="error-text">Select at least one weekday</p>
            </div>

            <!-- Monthly: Every __ Months + Day of month -->
            <div *ngIf="frequency === 'monthly'" class="form-group">
                <div class="flex items-center gap-3 mb-2">
                    <span class="text-sm font-medium">Every</span>
                    <input type="number" min="1" [(ngModel)]="everyNMonths" name="everyNMonths" class="number-input input" />
                    <span class="text-sm">month(s)</span>
                </div>
                <div class="flex items-center gap-3">
                    <span class="text-sm font-medium">On day</span>
                    <input type="number" min="1" max="31" [(ngModel)]="dayOfMonth" name="dayOfMonth" class="number-input input" />
                </div>
            </div>

            <!-- Yearly: Every __ Years + Month + Day -->
            <div *ngIf="frequency === 'yearly'" class="form-group">
                <div class="flex items-center gap-3 mb-2">
                    <span class="text-sm font-medium">Every</span>
                    <input type="number" min="1" [(ngModel)]="everyNYears" name="everyNYears" class="number-input input" />
                    <span class="text-sm">year(s)</span>
                </div>
                <div class="flex gap-3 items-center flex-wrap">
                    <div class="flex items-center gap-2">
                        <span class="text-sm">Month:</span>
                        <select [(ngModel)]="yearlyMonth" name="yearlyMonth" class="select">
                            <option *ngFor="let month of months" [value]="month.value">{{ month.name }}</option>
                        </select>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="text-sm">Day:</span>
                        <input type="number" min="1" max="31" [(ngModel)]="yearlyDay" name="yearlyDay" class="small-input input" />
                    </div>
                </div>
            </div>

            <!-- Reminders section -->
            <div class="form-group">
                <div class="flex items-center gap-2 mb-2">
                    <input type="checkbox" [(ngModel)]="remindersEnabled" name="remindersEnabled" class="checkbox" />
                    <label class="label">Enable Reminders</label>
                </div>
                <div *ngIf="remindersEnabled" class="sub-options">
                    <label class="label">Remind me</label>
                    <select [(ngModel)]="reminderOffset" name="reminderOffset" class="select">
                        <option value="5min">5 minutes before</option>
                        <option value="15min">15 minutes before</option>
                        <option value="30min">30 minutes before</option>
                        <option value="1hour">1 hour before</option>
                        <option value="1day">1 day before</option>
                        <option value="1week">1 week before</option>
                    </select>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="actions">
                <button type="button" (click)="close.emit()" class="button">Cancel</button>
                <button type="submit" class="button button-primary">Save</button>
            </div>
        </form>
    </div>
</div>
