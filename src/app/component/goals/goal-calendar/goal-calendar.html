<div class="overlay" (click)="close.emit()">
    <div class="modal" (click)="$event.stopPropagation()">
        <!-- Header -->
        <div class="header">
            <h2>{{ goal.title }} – Completion Calendar</h2>
            <button (click)="close.emit()" class="close-btn">✕</button>
        </div>

        <!-- Month navigation -->
        <div class="month-nav">
            <button (click)="prevMonth()" class="nav-btn">◀</button>
            <span class="month-title">{{ currentMonthName }} {{ currentYear }}</span>
            <button (click)="nextMonth()" class="nav-btn">▶</button>
        </div>

        <!-- Calendar grid -->
        <div class="weekdays">
            <div *ngFor="let day of weekDays" class="weekday">{{ day }}</div>
        </div>
        <div class="calendar-grid">
            <button *ngFor="let day of calendarDays" (click)="toggleDay(day)" [disabled]="!day.isCurrentMonth"
                class="day-btn"
                [class.day-completed]="day.completed && day.isCurrentMonth"
                [class.day-incomplete]="!day.completed && day.isCurrentMonth"
                [class.day-outside]="!day.isCurrentMonth">
                {{ day.date.getDate() }}
            </button>
        </div>

        <!-- Legend / Stats -->
        <div class="stats">
            <div class="stats-row">
                <span>✅ Completed: {{ completedCount }}</span>
                <span>📅 Total tracked: {{ totalTrackedDays }}</span>
            </div>
            <button (click)="resetAllForGoal()" class="reset-btn">Reset all completion data for this goal</button>
        </div>
    </div>
</div>
